<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroConf Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#f2f1ed; --surface:#fff; --indigo-bg:#eceaf8; --border:#d8d5ee; --border2:#b8b3e0;
      --indigo:#3730a3; --indigo-lt:#6460c8; --purple:#7c3aed; --purple-bg:#f5f3ff; --purple-bd:#ddd6fe;
      --text:#0f0e1a; --text2:#1e1b4b; --label:#1f2937; --sublabel:#374151; --muted:#6b7280;
      --red:#b91c1c; --amber:#b45309; --green:#047857;
      --red-bg:#fef2f2; --amber-bg:#fffbeb; --green-bg:#ecfdf5;
      --red-bd:#fecaca; --amber-bd:#fde68a; --green-bd:#a7f3d0;
      --mono:'DM Mono',monospace; --body:'DM Sans',sans-serif; --display:'Fraunces',serif;
      --r:10px; --shadow:0 1px 4px rgba(55,48,163,.07),0 6px 20px rgba(55,48,163,.05);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--body);font-size:15px;line-height:1.55;min-height:100vh;padding-bottom:80px}

    header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 40px;position:sticky;top:0;z-index:100;box-shadow:0 2px 16px rgba(55,48,163,.08)}
    .header-inner{max-width:1160px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;padding:18px 0;gap:20px;flex-wrap:wrap}
    .logo-title{font-family:var(--display);font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.02em}
    .logo-title em{color:var(--indigo);font-style:normal}
    .logo-sub{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-top:3px}
    .header-stats{display:flex;gap:36px}
    .stat{text-align:right}
    .stat-val{font-family:var(--display);font-size:28px;font-weight:700;color:var(--indigo);line-height:1}
    .stat-lbl{font-family:var(--mono);font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-top:1px}

    .wrap{max-width:1160px;margin:0 auto;padding:24px 40px 0}

    #changelog-banner{background:linear-gradient(135deg,#eef2ff,#f0edff);border:1px solid #c7d2fe;border-radius:var(--r);padding:14px 20px;margin-bottom:16px;display:none}
    .cl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
    .cl-title{font-family:var(--display);font-size:14px;font-weight:600;color:var(--indigo)}
    .cl-date{font-family:var(--mono);font-size:10px;color:var(--muted)}
    .cl-item{font-size:13px;color:var(--text2);display:flex;align-items:flex-start;gap:8px;margin-top:4px}
    .cl-tag{font-family:var(--mono);font-size:9px;font-weight:500;padding:2px 7px;border-radius:3px;white-space:nowrap;margin-top:2px}
    .cl-new{background:#dcfce7;color:#166534}.cl-updated{background:#dbeafe;color:#1e40af}.cl-warning{background:#fef9c3;color:#854d0e}

    .deadline-banner{background:var(--purple-bg);border:1px solid var(--purple-bd);border-radius:var(--r);padding:12px 20px;margin-bottom:18px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
    .dl-banner-label{font-family:var(--mono);font-size:11px;color:var(--purple);font-weight:600;letter-spacing:.06em;white-space:nowrap}
    .dl-banner-items{display:flex;gap:16px;flex-wrap:wrap}
    .dl-banner-item{font-family:var(--mono);font-size:11px;color:var(--text2)}
    .dl-banner-item.urgent{color:var(--red);font-weight:600}.dl-banner-item.near{color:var(--purple);font-weight:500}

    .controls-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
    input[type=text]{flex:1;min-width:220px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 15px;color:var(--text);font-family:var(--body);font-size:14px;outline:none;transition:border-color .15s,box-shadow .15s}
    input[type=text]:focus{border-color:var(--indigo-lt);box-shadow:0 0 0 3px rgba(55,48,163,.1)}
    input[type=text]::placeholder{color:var(--muted)}
    select{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--r);padding:10px 15px;color:var(--text2);font-family:var(--mono);font-size:12px;outline:none;cursor:pointer}
    .filter-toggle-btn{display:inline-flex;align-items:center;gap:7px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);padding:9px 16px;border-radius:var(--r);font-family:var(--body);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap}
    .filter-toggle-btn:hover{border-color:var(--indigo-lt);color:var(--indigo);background:var(--indigo-bg)}
    .filter-toggle-btn.active{border-color:var(--indigo);background:var(--indigo);color:#fff}
    .filter-toggle-btn .arrow{font-size:10px;transition:transform .2s}
    .filter-toggle-btn.active .arrow{transform:rotate(180deg)}
    .filter-count{font-family:var(--mono);font-size:10px;opacity:.75}

    .filter-panel{overflow:hidden;max-height:0;transition:max-height .3s ease,opacity .3s ease;opacity:0}
    .filter-panel.open{max-height:200px;opacity:1}
    .categories{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px;padding-top:10px}
    .cat-btn{display:inline-flex;align-items:center;gap:6px;border:1.5px solid var(--border2);background:var(--surface);color:var(--text2);padding:6px 15px;border-radius:20px;font-family:var(--body);font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
    .cat-btn:hover{border-color:var(--indigo-lt);color:var(--indigo);background:var(--indigo-bg)}
    .cat-btn.active{border-color:var(--indigo);background:var(--indigo);color:#fff;box-shadow:0 2px 8px rgba(55,48,163,.25)}
    .cat-btn .cat-count{font-family:var(--mono);font-size:10px;opacity:.6}
    .cat-btn.active .cat-count{opacity:.8}

    .view-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:10px}
    .count-label{font-family:var(--mono);font-size:12px;color:var(--label)}
    .toggle-btns{display:flex;gap:4px}
    .toggle-btn{padding:7px 16px;border-radius:6px;cursor:pointer;font-family:var(--mono);font-size:11px;font-weight:500;letter-spacing:.05em;border:1.5px solid var(--border2);background:transparent;color:var(--label);transition:all .15s}
    .toggle-btn.active{background:var(--indigo);border-color:var(--indigo);color:#fff;box-shadow:0 2px 8px rgba(55,48,163,.2)}

    .table-wrap{overflow-x:auto;border-radius:var(--r);box-shadow:var(--shadow)}
    table{width:100%;border-collapse:collapse;background:var(--surface)}
    thead tr{border-bottom:2px solid var(--border)}
    th{text-align:left;padding:11px 14px;font-family:var(--mono);font-size:9px;color:var(--label);text-transform:uppercase;letter-spacing:.1em;white-space:nowrap;background:#f7f6fc;vertical-align:bottom}
    th .th-line2{display:block;margin-top:1px}
    td{padding:12px 14px;border-bottom:1px solid var(--border);vertical-align:top}
    tbody tr:last-child td{border-bottom:none}
    tbody tr:hover td{background:#faf9fd}
    .conf-name{font-family:var(--display);font-size:14px;font-weight:600;color:var(--text);line-height:1.3}
    .conf-org{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px}
    .loc-city{font-family:var(--mono);font-size:12px;color:var(--text);white-space:nowrap}
    .loc-country{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:1px;white-space:nowrap}
    .date-cell{white-space:nowrap;font-size:12px;color:var(--text);font-family:var(--mono)}
    .dl-val{display:block;font-family:var(--mono);font-size:12px;font-weight:500}
    .days-badge{display:inline-block;font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;margin-top:3px;font-weight:500;border:1px solid}
    .days-urgent{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
    .days-near{background:var(--purple-bg);color:var(--purple);border-color:var(--purple-bd)}
    .days-ok{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
    .days-past{background:var(--red-bg);color:var(--red);border-color:var(--red-bd);font-size:10px;font-family:var(--mono);padding:2px 7px;border-radius:4px;display:inline-block;border:1px solid;font-weight:500}
    .link-cell a{color:var(--indigo);text-decoration:none;font-family:var(--mono);font-size:11px;border-bottom:1px solid rgba(55,48,163,.3);padding-bottom:1px;font-weight:500}
    .link-cell a:hover{border-color:var(--indigo)}
    .changed-row td{background:#f5f3ff!important}
    .changed-row td:first-child{border-left:3px solid var(--indigo)}

    .cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
    .card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:22px;position:relative;overflow:hidden;box-shadow:var(--shadow);transition:border-color .2s,box-shadow .2s}
    .card:hover{border-color:var(--border2);box-shadow:0 6px 24px rgba(55,48,163,.1)}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:14px 14px 0 0}
    .card.open::before{background:linear-gradient(90deg,var(--green),#34d399)}
    .card.closed::before{background:linear-gradient(90deg,var(--red),#f87171)}
    .card.tbd::before{background:linear-gradient(90deg,#9ca3af,#d1d5db)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
    .card-name{font-family:var(--display);font-size:16px;font-weight:600;color:var(--text);line-height:1.3}
    .card-org{font-family:var(--mono);font-size:10px;color:var(--muted);margin-top:3px}
    .card-meta{font-family:var(--mono);font-size:12px;color:var(--text2);margin-bottom:14px;line-height:1.9}
    .card-meta strong{color:var(--text)}
    .card-deadlines{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px}
    .dl-block{background:var(--indigo-bg);border-radius:8px;padding:9px 11px}
    .dl-label{font-family:var(--mono);font-size:8px;color:var(--indigo-lt);text-transform:uppercase;letter-spacing:.1em;margin-bottom:4px}
    .dl-date{font-family:var(--mono);font-size:11px;color:var(--text);font-weight:500}
    .card-notes{font-size:13px;color:var(--sublabel);line-height:1.6;margin-bottom:12px;font-style:italic;font-family:var(--display);font-weight:400}
    .card-footer{display:flex;justify-content:space-between;align-items:center}
    .card-link{color:var(--indigo);text-decoration:none;font-family:var(--mono);font-size:11px;border-bottom:1px solid rgba(55,48,163,.3);font-weight:500}
    .card-link:hover{border-color:var(--indigo)}
    .card.changed{border-color:#a5b4fc}
    .card.changed::after{content:'✦ Updated';position:absolute;top:12px;right:14px;font-family:var(--mono);font-size:9px;color:var(--indigo);background:#eef2ff;padding:2px 7px;border-radius:3px}

    .empty{text-align:center;padding:80px 0;font-family:var(--mono);color:var(--muted);font-size:13px}
    .last-updated{font-family:var(--mono);font-size:10px;color:var(--muted);text-align:right;margin-top:28px}

    @media(max-width:700px){
      header{padding:0 16px}.wrap{padding:20px 16px 0}.header-stats{gap:16px}
      .card-deadlines{grid-template-columns:1fr 1fr}
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="logo-title">NeuroConf <em>Tracker</em></div>
      <div class="logo-sub">Neuroscience Conference Dashboard · Auto-updated weekly</div>
    </div>
    <div class="header-stats">
      <div class="stat"><div class="stat-val" id="total-count">—</div><div class="stat-lbl">Conferences</div></div>
      <div class="stat"><div class="stat-val" id="open-count">—</div><div class="stat-lbl">Abstracts Open</div></div>
      <div class="stat"><div class="stat-val" id="upcoming-count">—</div><div class="stat-lbl">In Next 90d</div></div>
    </div>
  </div>
</header>

<div class="wrap">
  <div id="changelog-banner">
    <div class="cl-header"><span class="cl-title">✦ What changed this week</span><span class="cl-date" id="cl-date"></span></div>
    <div id="cl-items"></div>
  </div>

  <div class="deadline-banner" id="deadline-banner"></div>

  <div class="controls-row">
    <input type="text" id="search" placeholder="Search by name, location, organisation…" oninput="render()">
    <select onchange="currentSort=this.value;render()">
      <option value="date">Sort: Conference Date</option>
      <option value="abstract">Sort: Abstract Deadline</option>
      <option value="name">Sort: Name (A–Z)</option>
    </select>
    <select onchange="currentStatus=this.value;render()">
      <option value="all">All Statuses</option>
      <option value="open">Abstract Open</option>
      <option value="closed">Abstract Closed</option>
      <option value="tbd">TBD</option>
    </select>
    <button class="filter-toggle-btn" id="filter-btn" onclick="toggleFilters()">
      Filters <span class="filter-count" id="filter-count"></span> <span class="arrow">▼</span>
    </button>
  </div>

  <div class="filter-panel" id="filter-panel">
    <div class="categories" id="categories-bar"></div>
  </div>

  <div class="view-row">
    <span class="count-label" id="count-label"></span>
    <div class="toggle-btns">
      <button class="toggle-btn active" id="btn-table" onclick="setView('table')">TABLE</button>
      <button class="toggle-btn" id="btn-cards" onclick="setView('cards')">CARDS</button>
    </div>
  </div>

  <div id="content"></div>
  <div class="last-updated" id="last-updated">Last verified: 17 May 2026 · Always confirm deadlines on official websites.</div>
</div>

// DATA_END

let activeCategory = null;
let currentView    = 'table';
let currentSort    = 'date';
let currentStatus  = 'all';
let filtersOpen    = false;

const today    = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const parseDate = s  => (!s||s==='TBD') ? null : new Date(s);
const daysUntil = s  => { const d=parseDate(s); return d ? Math.ceil((d-today())/86400000) : null; };

function fmtDate(s) {
  if(!s||s==='TBD') return '—';
  if(s==='?') return '?';
  return parseDate(s).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'});
}
function fmtRange(s,e) {
  if(s==='TBD') return 'TBD';
  const ds=parseDate(s),de=parseDate(e);
  const mo=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  if(ds.getMonth()===de.getMonth()&&ds.getFullYear()===de.getFullYear())
    return `${ds.getDate()}–${de.getDate()} ${mo[ds.getMonth()]} ${ds.getFullYear()}`;
  return `${ds.getDate()} ${mo[ds.getMonth()]} – ${de.getDate()} ${mo[de.getMonth()]} ${ds.getFullYear()}`;
}
function timeLeft(d) {
  // d = days remaining (integer)
  if(d<=7)  return `${d}d`;
  if(d<=28) return `${Math.round(d/7)}w`;
  return `${Math.round(d/30.44)}mo`;
}
function deadlineBadge(s) {
  if(s==='?') return '';
  const d=daysUntil(s);
  if(d===null) return '<span class="days-past">—</span>';
  if(d<0)      return '<span class="days-past">Closed</span>';
  if(d<=7)     return `<span class="days-badge days-urgent">${timeLeft(d)} left</span>`;
  if(d<=28)    return `<span class="days-badge days-near">${timeLeft(d)} left</span>`;
  return       `<span class="days-badge days-ok">${timeLeft(d)} left</span>`;
}
function dlColor(s) {
  if(s==='?') return 'var(--muted)';
  const d=daysUntil(s);
  if(d===null||d<0) return 'var(--muted)';
  if(d<=7)  return 'var(--red)';
  if(d<=28) return 'var(--purple)';
  return 'var(--green)';
}

function getVisible() { return CONFERENCES.filter(c => !c.hidden); }

function getFiltered() {
  const q=document.getElementById('search').value.toLowerCase();
  const catIds=activeCategory ? CATEGORIES.find(c=>c.id===activeCategory)?.ids : null;
  let list=getVisible().filter(c=>{
    if(catIds && !catIds.includes(c.id)) return false;
    if(currentStatus!=='all' && c.status!==currentStatus) return false;
    if(q && !c.name.toLowerCase().includes(q) && !c.org.toLowerCase().includes(q)
       && !c.city.toLowerCase().includes(q) && !c.country.toLowerCase().includes(q)
       && !c.short.toLowerCase().includes(q)) return false;
    return true;
  });
  list.sort((a,b)=>{
    if(currentSort==='name') return a.name.localeCompare(b.name);
    if(currentSort==='abstract'){
      const da=parseDate(a.abstractDeadline),db=parseDate(b.abstractDeadline);
      if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1; return da-db;
    }
    const da=parseDate(a.dates.start),db=parseDate(b.dates.start);
    if(!da&&!db) return 0; if(!da) return 1; if(!db) return -1; return da-db;
  });
  return list;
}

function toggleFilters() {
  filtersOpen=!filtersOpen;
  document.getElementById('filter-panel').classList.toggle('open',filtersOpen);
  document.getElementById('filter-btn').classList.toggle('active',filtersOpen);
}

function renderChangelog() {
  if(!CHANGELOG.length) return;
  document.getElementById('changelog-banner').style.display='block';
  document.getElementById('cl-date').textContent=CHANGELOG[0]?.date||'';
  document.getElementById('cl-items').innerHTML=(CHANGELOG[0]?.changes||[]).map(ch=>`
    <div class="cl-item">
      <span class="cl-tag ${ch.type==='new'?'cl-new':ch.type==='updated'?'cl-updated':'cl-warning'}">${ch.type.toUpperCase()}</span>
      <span><strong>${ch.conf}</strong> — ${ch.text}</span>
    </div>`).join('');
}

function renderDeadlineBanner() {
  const upcoming=getVisible()
    .filter(c=>{const d=daysUntil(c.abstractDeadline);return d!==null&&d>=0&&d<=90;})
    .sort((a,b)=>daysUntil(a.abstractDeadline)-daysUntil(b.abstractDeadline));
  const el=document.getElementById('deadline-banner');
  if(!upcoming.length){el.style.display='none';return;}
  el.innerHTML=`<span class="dl-banner-label">Abstract deadlines within 90 days</span>
    <div class="dl-banner-items">${upcoming.map(c=>{
      const d=daysUntil(c.abstractDeadline);
      return `<span class="dl-banner-item ${d<=7?'urgent':d<=28?'near':''}">${c.short} <span style="opacity:.65">(${timeLeft(d)})</span></span>`;
    }).join('')}</div>`;
}

function renderCategories() {
  const active=CATEGORIES.find(c=>c.id===activeCategory);
  document.getElementById('filter-count').textContent=active?`· ${active.label}`:'';
  document.getElementById('categories-bar').innerHTML=CATEGORIES.map(cat=>`
    <button class="cat-btn ${activeCategory===cat.id?'active':''}" onclick="toggleCat('${cat.id}')">
      ${cat.label} <span class="cat-count">${cat.ids.length}</span>
    </button>`).join('');
}
function toggleCat(id){activeCategory=activeCategory===id?null:id;render();}

// ── Classify a conference into a section ──────────────────────────────────────
function sectionOf(c) {
  const start = parseDate(c.dates.start);
  const end   = parseDate(c.dates.end);
  const ref   = end || start;
  if(!ref) {
    // No dates — use the explicit year hint if provided, else default to 2026
    return (c.year && c.year >= 2027) ? 'upcoming2027' : 'upcoming2026';
  }
  const endDay = Math.ceil((ref - today()) / 86400000);
  if(endDay < 0) return 'passed';
  const year = ref.getFullYear();
  return year <= 2026 ? 'upcoming2026' : 'upcoming2027';
}

// ── Single table (no section header) ─────────────────────────────────────────
function tableHTML(list, muted) {
  if(!list.length) return `<div class="empty" style="padding:28px 0">No conferences in this section match your filters.</div>`;
  return `<div class="table-wrap" style="${muted?'opacity:.7':''}"><table>
    <thead><tr>
      <th>Conference</th>
      <th>Location</th>
      <th>Dates</th>
      <th>Abstract<span class="th-line2">Deadline</span></th>
      <th>Early<span class="th-line2">Registration</span></th>
      <th>Final<span class="th-line2">Registration</span></th>
      <th>Website</th>
    </tr></thead>
    <tbody>${list.map(c=>`<tr class="${c.changed?'changed-row':''}">
      <td>
        <div class="conf-name">${c.name}${c.changed?' <span style="font-family:var(--mono);font-size:9px;color:var(--indigo);background:#eef2ff;padding:1px 5px;border-radius:3px;margin-left:4px">✦</span>':''}</div>
        <div class="conf-org">${c.org}</div>
      </td>
      <td><div class="loc-city">${c.city}</div><div class="loc-country">${c.country}</div></td>
      <td class="date-cell">${fmtRange(c.dates.start,c.dates.end)}</td>
      <td><span class="dl-val" style="color:${dlColor(c.abstractDeadline)}">${fmtDate(c.abstractDeadline)}</span>${deadlineBadge(c.abstractDeadline)}</td>
      <td><span class="dl-val" style="color:${dlColor(c.earlyReg)}">${fmtDate(c.earlyReg)}</span>${deadlineBadge(c.earlyReg)}</td>
      <td><span class="dl-val" style="color:${dlColor(c.finalReg)}">${fmtDate(c.finalReg)}</span>${deadlineBadge(c.finalReg)}</td>
      <td class="link-cell"><a href="${c.website}" target="_blank" rel="noopener">↗ Visit</a></td>
    </tr>`).join('')}</tbody></table></div>`;
}

// ── Single card group ─────────────────────────────────────────────────────────
function cardsHTML(list, muted) {
  if(!list.length) return `<div class="empty" style="padding:28px 0">No conferences in this section match your filters.</div>`;
  return `<div class="cards" style="${muted?'opacity:.7':''}">${list.map(c=>`
    <div class="card ${c.status}${c.changed?' changed':''}">
      <div class="card-header">
        <div><div class="card-name">${c.name}</div><div class="card-org">${c.org}</div></div>
      </div>
      <div class="card-meta"><strong>📍</strong> ${c.city}, ${c.country}<br><strong>🗓</strong> ${fmtRange(c.dates.start,c.dates.end)}</div>
      <div class="card-deadlines">
        <div class="dl-block">
          <div class="dl-label">Abstract</div>
          <div class="dl-date">${fmtDate(c.abstractDeadline)}</div>
          <div style="margin-top:4px">${deadlineBadge(c.abstractDeadline)}</div>
        </div>
        <div class="dl-block">
          <div class="dl-label">Early Reg.</div>
          <div class="dl-date">${fmtDate(c.earlyReg)}</div>
          <div style="margin-top:4px">${deadlineBadge(c.earlyReg)}</div>
        </div>
        <div class="dl-block">
          <div class="dl-label">Final Reg.</div>
          <div class="dl-date">${fmtDate(c.finalReg)}</div>
          <div style="margin-top:4px">${deadlineBadge(c.finalReg)}</div>
        </div>
      </div>
      ${c.notes?`<div class="card-notes">${c.notes}</div>`:''}
      <div class="card-footer">
        <a class="card-link" href="${c.website}" target="_blank" rel="noopener">↗ Official website</a>
      </div>
    </div>`).join('')}</div>`;
}

// ── Section header ────────────────────────────────────────────────────────────
function sectionHeader(title, count, accent, icon) {
  return `<div style="display:flex;align-items:center;gap:12px;margin:28px 0 14px">
    <span style="font-family:var(--display);font-size:19px;font-weight:700;color:${accent}">${icon} ${title}</span>
    <span style="font-family:var(--mono);font-size:11px;color:var(--muted);background:var(--bg);border:1px solid var(--border);padding:2px 9px;border-radius:20px">${count}</span>
    <div style="flex:1;height:1px;background:var(--border)"></div>
  </div>`;
}

function updateStats() {
  const vis=getVisible();
  document.getElementById('total-count').textContent=vis.length;
  document.getElementById('open-count').textContent=vis.filter(c=>c.status==='open').length;
  document.getElementById('upcoming-count').textContent=vis.filter(c=>{
    const d=daysUntil(c.dates.start);return d!==null&&d>=0&&d<=90;
  }).length;
}

function setView(v){
  currentView=v;
  document.getElementById('btn-table').className='toggle-btn'+(v==='table'?' active':'');
  document.getElementById('btn-cards').className='toggle-btn'+(v==='cards'?' active':'');
  render();
}

function render(){
  renderCategories();
  const list = getFiltered();
  document.getElementById('count-label').textContent=`${list.length} conference${list.length!==1?'s':''} shown`;

  const s2026   = list.filter(c=>sectionOf(c)==='upcoming2026');
  const s2027   = list.filter(c=>sectionOf(c)==='upcoming2027');
  const passed  = list.filter(c=>sectionOf(c)==='passed');

  const renderFn = currentView==='table' ? tableHTML : cardsHTML;
  let html = '';

  if(s2026.length || !s2027.length && !passed.length) {
    html += sectionHeader('Upcoming 2026', s2026.length, 'var(--indigo)', '📅');
    html += renderFn(s2026, false);
  }
  if(s2027.length) {
    html += sectionHeader('Upcoming 2027', s2027.length, 'var(--purple)', '📆');
    html += renderFn(s2027, false);
  }
  if(passed.length) {
    html += sectionHeader('Passed 2026', passed.length, 'var(--muted)', '✓');
    html += renderFn(passed, true);
  }

  document.getElementById('content').innerHTML = html || '<div class="empty">No conferences match your filters.</div>';
}

renderChangelog(); renderDeadlineBanner(); updateStats(); render();
</script>
